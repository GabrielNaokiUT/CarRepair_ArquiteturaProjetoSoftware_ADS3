<div class="inner-page">
  <div class="inner-hero">
    <div class="inner-hero-top">
      <div>
        <div class="inner-label">Cadastro</div>
        <div class="inner-title">Mecânicos</div>
      </div>
    </div>
  </div>

  <div class="inner-content">
    <div class="form-card">
      <div class="form-title">Novo mecânico</div>
      <form #formMecanico="ngForm" (ngSubmit)="salvarMecanico(formMecanico)">
        <div class="form-grid">
          <div class="form-group">
            <label>Nome</label>
            <input name="nome" [(ngModel)]="novoMecanico.nome" required minlength="3" placeholder="Nome completo" />
          </div>
          <div class="form-group">
            <label>Especialidade</label>
            <input name="especialidade" [(ngModel)]="novoMecanico.especialidade" required placeholder="Ex.: Suspensão, Motor" />
          </div>
          <div class="form-group">
            <label>Telefone</label>
            <input name="telefone" [(ngModel)]="novoMecanico.telefone" required placeholder="(00) 00000-0000" />
          </div>
        </div>
        <ul class="erros" *ngIf="errosFormulario.length">
          <li *ngFor="let erro of errosFormulario">{{ erro }}</li>
        </ul>
        <div class="form-actions">
          <button class="btn-save" type="submit">Salvar mecânico</button>
        </div>
      </form>
    </div>

    <div class="table-card">
      <div class="table-top">
        <span class="table-count">{{ mecanicos.length }} registro(s)</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Especialidade</th>
            <th>Telefone</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let mecanico of mecanicos">
            <td class="td-p">{{ mecanico.nome }}</td>
            <td>{{ mecanico.especialidade }}</td>
            <td>{{ mecanico.telefone }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
