<div class="inner-page">
  <div class="inner-hero">
    <div class="inner-hero-top">
      <div>
        <div class="inner-label">Cadastro</div>
        <div class="inner-title">Clientes</div>
      </div>
    </div>
  </div>

  <div class="inner-content">
    <div class="form-card">
      <div class="form-title">Novo cliente</div>
      <form #formCliente="ngForm" (ngSubmit)="salvarCliente(formCliente)">
        <div class="form-grid">
          <div class="form-group">
            <label>Nome</label>
            <input name="nome" [(ngModel)]="novoCliente.nome" required minlength="3" placeholder="Nome completo" />
          </div>
          <div class="form-group">
            <label>CPF</label>
            <input name="cpf" [(ngModel)]="novoCliente.cpf" required placeholder="Somente números" />
          </div>
          <div class="form-group">
            <label>Telefone</label>
            <input name="telefone" [(ngModel)]="novoCliente.telefone" required placeholder="(00) 00000-0000" />
          </div>
        </div>
        <ul class="erros" *ngIf="errosFormulario.length">
          <li *ngFor="let erro of errosFormulario">{{ erro }}</li>
        </ul>
        <div class="form-actions">
          <button class="btn-save" type="submit">Salvar cliente</button>
        </div>
      </form>
    </div>

    <div class="table-card">
      <div class="table-top">
        <span class="table-count">{{ clientes.length }} registro(s)</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Telefone</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cliente of clientes">
            <td class="td-p">{{ cliente.nome }}</td>
            <td>{{ cliente.cpf }}</td>
            <td>{{ cliente.telefone }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
