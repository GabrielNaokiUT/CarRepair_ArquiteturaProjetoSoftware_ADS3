<div class="inner-page">
  <div class="inner-hero">
    <div class="inner-hero-top">
      <div>
        <div class="inner-label">Cadastro</div>
        <div class="inner-title">Veículos</div>
      </div>
    </div>
  </div>

  <div class="inner-content">
    <div class="form-card">
      <div class="form-title">Novo veículo</div>
      <form #formVeiculo="ngForm" (ngSubmit)="salvarVeiculo(formVeiculo)">
        <div class="form-grid">
          <div class="form-group form-full">
            <label>Cliente</label>
            <select name="idCliente" [(ngModel)]="novoVeiculo.idCliente" required>
              <option [ngValue]="0">Selecione um cliente</option>
              <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">{{ cliente.nome }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>Placa</label>
            <input name="placa" [(ngModel)]="novoVeiculo.placa" required placeholder="ABC-1234" />
          </div>
          <div class="form-group">
            <label>Modelo</label>
            <input name="modelo" [(ngModel)]="novoVeiculo.modelo" required placeholder="Ex.: Corolla" />
          </div>
          <div class="form-group">
            <label>Marca</label>
            <input name="marca" [(ngModel)]="novoVeiculo.marca" required placeholder="Ex.: Toyota" />
          </div>
          <div class="form-group">
            <label>Ano</label>
            <input name="anoFabricacao" type="number" [(ngModel)]="novoVeiculo.anoFabricacao" required placeholder="2024" />
          </div>
        </div>
        <ul class="erros" *ngIf="errosFormulario.length">
          <li *ngFor="let erro of errosFormulario">{{ erro }}</li>
        </ul>
        <div class="form-actions">
          <button class="btn-save" type="submit">Salvar veículo</button>
        </div>
      </form>
    </div>

    <div class="table-card">
      <div class="table-top">
        <span class="table-count">{{ veiculos.length }} registro(s)</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Placa</th>
            <th>Modelo</th>
            <th>Marca</th>
            <th>Ano</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let veiculo of veiculos">
            <td class="td-p">{{ nomeCliente(veiculo.idCliente) }}</td>
            <td>{{ veiculo.placa }}</td>
            <td>{{ veiculo.modelo }}</td>
            <td>{{ veiculo.marca }}</td>
            <td>{{ veiculo.anoFabricacao }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
