<div class="inner-page">
  <div class="inner-hero">
    <div class="inner-hero-top">
      <div>
        <div class="inner-label">Gestão</div>
        <div class="inner-title">Serviços</div>
      </div>
      <button class="btn-add" (click)="toggleForm()">
        {{ formAberto ? '✕ Cancelar' : '+ Novo serviço' }}
      </button>
    </div>
  </div>

  <div class="inner-content">
    <div class="form-wrapper" [class.open]="formAberto">
      <div class="form-card">
        <div class="form-title">{{ editando ? 'Editar serviço' : 'Cadastrar serviço' }}</div>
        <form #formServico="ngForm" (ngSubmit)="salvarServico(formServico)">
          <div class="form-grid cols3">
            <div class="form-group">
              <label>Nome do serviço</label>
              <input name="nome" [(ngModel)]="novoServico.nome" required
                placeholder="Ex: Troca de óleo"
                (input)="capitalizarPrimeira($event, 'nome')" />
            </div>
            <div class="form-group">
              <label>Descrição</label>
              <input name="descricao" [(ngModel)]="novoServico.descricao" required
                placeholder="Descreva o serviço executado"
                (input)="capitalizarPrimeira($event, 'descricao')" />
            </div>
            <div class="form-group">
              <label>Valor (R$)</label>
              <input name="preco" type="number" [(ngModel)]="novoServico.preco" required min="0.01" step="0.01" placeholder="0,00" />
            </div>
          </div>
          <ul class="erros" *ngIf="errosFormulario.length">
            <li *ngFor="let erro of errosFormulario">{{ erro }}</li>
          </ul>
          <div class="form-actions">
            <button class="btn-save" type="submit">Salvar serviço</button>
            <button class="btn-cancel-form" type="button" (click)="toggleForm()">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="table-card">
      <div class="table-top">
        <span class="table-count">{{ servicos.length }} registro(s)</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Valor</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let servico of servicos">
            <td class="td-p">{{ servico.nome }}</td>
            <td>{{ servico.descricao }}</td>
            <td class="td-v">R$ {{ servico.preco | number:'1.2-2' }}</td>
            <td>
              <span class="badge" [class.b-ativo]="servico.active" [class.b-inativo]="!servico.active">
                {{ servico.active ? 'Ativo' : 'Inativo' }}
              </span>
            </td>
            <td>
              <div class="td-acoes">
                <button class="btn-edit" type="button" (click)="editarServico(servico)">✏ Editar</button>
                <button class="btn-delete" type="button" (click)="excluirServico(servico.id)">✕ Excluir</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
